<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kheyra Cinematic Story ❤️ FINAL</title>

<style>
body {
  margin:0;
  background:black;
  overflow:hidden;
  font-family:sans-serif;
  color:white;
}

/* START */
.startScreen {
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:999;
}

.startBtn {
  padding:15px 30px;
  border:none;
  border-radius:30px;
  background:#ff4d6d;
  color:white;
  font-size:18px;
  cursor:pointer;
}

/* TEXT */
.center {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  width:90%;
}

.text {
  font-size:clamp(22px,5vw,36px);
  opacity:0;
  transition:1s;
}

.show { opacity:1; }

/* IMAGE */
img {
  position:absolute;
  width:clamp(120px,25vw,260px);
  border-radius:15px;
  opacity:0;
  transition:1s;
}

#kheyra { left:5%; top:60%; transform:translateY(-50%); }
#juyeon { right:5%; top:60%; transform:translateY(-50%); }
#christian { right:5%; top:60%; transform:translateY(-50%); }

/* EFFECT */
.glow {
  box-shadow:0 0 40px #ff4d6d;
  transform:scale(1.1);
}

/* DORONG KELUAR */
.pushOut {
  animation: pushOut 1s forwards;
}

@keyframes pushOut {
  from { transform:translateY(-50%) translateX(0); opacity:1; }
  to { transform:translateY(-50%) translateX(200px); opacity:0; }
}

/* MASUK */
.enterRight {
  animation: enterRight 1s forwards;
}

@keyframes enterRight {
  from { transform:translateY(-50%) translateX(200px); opacity:0; }
  to { transform:translateY(-50%) translateX(0); opacity:1; }
}

/* FLASH */
.flash {
  position:absolute;
  width:100%;
  height:100%;
  background:white;
  opacity:0;
}

/* HEART */
.heart {
  position:absolute;
  width:10px;
  height:10px;
  background:red;
  transform:rotate(45deg);
}

.heart::before,
.heart::after {
  content:"";
  position:absolute;
  width:10px;
  height:10px;
  background:red;
  border-radius:50%;
}

.heart::before { top:-5px; }
.heart::after { left:-5px; }

</style>
</head>

<body>

<div id="startScreen" class="startScreen">
  <h2>💖 Sebuah Kisah Akan Dimulai 💖</h2>
  <button class="startBtn" onclick="startExperience()">Mulai</button>
</div>

<div id="flash" class="flash"></div>

<!-- TEXT -->
<div id="text" class="center text"></div>

<!-- IMAGES -->
<img id="kheyra" src="kheyra.jpg">
<img id="juyeon" src="juyeon.jpg">
<img id="christian" src="christian.jpg">

<audio id="music" loop preload="auto">
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
const music = document.getElementById("music");
const flash = document.getElementById("flash");
const textEl = document.getElementById("text");

function startExperience(){
  document.getElementById("startScreen").style.display = "none";
  music.play();
  startStory();
}

function setText(content){
  textEl.classList.remove("show");
  setTimeout(()=>{
    textEl.innerHTML = content;
    textEl.classList.add("show");
  },300);
}

function flashEffect(){
  flash.style.opacity=1;
  setTimeout(()=>flash.style.opacity=0,300);
}

function hearts(){
  const h=document.createElement("div");
  h.className="heart";
  h.style.left=Math.random()*window.innerWidth+"px";
  h.style.top=window.innerHeight+"px";
  document.body.appendChild(h);

  let pos=window.innerHeight;
  const anim=setInterval(()=>{
    pos-=3;
    h.style.top=pos+"px";
    if(pos<0){clearInterval(anim);h.remove();}
  },20);
}

function startStory(){

let t = 0;

// tampil awal
setTimeout(()=>{
  document.getElementById("kheyra").style.opacity = 1;
  document.getElementById("juyeon").style.opacity = 1;
},500);

function step(txt, delay=4000){
  setTimeout(()=>setText(txt), t);
  t += delay;
}

// STORY
step("Kheyra ❤️ Juyeon");
step("Semua terasa sempurna...");
step("Hari penuh tawa...");
step("Namun semuanya berubah...");
step("Perasaan tidak lagi sama...");
step("Dan akhirnya...");

// PUSH EFFECT 💥
setTimeout(()=>{
  setText("Juyeon pergi 💔");
  document.getElementById("juyeon").classList.add("pushOut");
}, t);

t += 5000;

// SENDIRI
step("Kheyra sendirian...");
step("Dunia terasa kosong...");
step("Hingga suatu hari...");

// CHRISTIAN MASUK 💥
setTimeout(()=>{
  flashEffect();
  setText("💥 Christian datang");

  const c = document.getElementById("christian");
  c.style.opacity = 1;
  c.classList.add("enterRight");
}, t);

t += 5000;

// ENDING
step("Membawa harapan baru...");
step("Dan kini...");
step("Kheyra ❤️ Christian 💖", 5000);

// glow
setTimeout(()=>{
  document.getElementById("kheyra").classList.add("glow");
  document.getElementById("christian").classList.add("glow");
}, t);

// hearts
setInterval(hearts,300);

}

</script>

</body>
</html>
